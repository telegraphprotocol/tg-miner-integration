version: "1"
kind: miner
id: 101
slug: sapling-ai-detector
protocol: generic
name: Sapling AI Detector
description: >
  Sapling's AI Content Detector — detects whether a piece of text was
  written by a human or generated by AI. The autonomous engine can use
  Sapling for content authenticity verification before acting on
  text-based signals.

base_url: https://api.sapling.ai

auth:
  type: header
  env_var: SAPLING_API_KEY
  header_name: X-API-Key

rate_limit_per_sec: 5
cache_ttl_sec: 300
circuit_threshold: 5
circuit_cooldown_seconds: 60

endpoints:
  - path: /detect
    external_path: /api/v1/aidetect
    method: POST
    description: Detect whether a piece of text is AI-generated.

input_schema:
  type: object
  required: [text]
  properties:
    text:
      type: string
      minLength: 1
      description: The text sample to analyze for AI authorship.

output_schema:
  type: object
  properties:
    score:
      type: number
      minimum: 0
      maximum: 1
      description: >
        Likelihood the text is AI-generated, from 0 (human) to 1 (AI).
    sentence_scores:
      type: array
      description: Per-sentence AI-likelihood breakdown.

semantics:
  signal_mapping:
    type: text_authenticity
    confidence_field: score
    label_field: score
    reason_field: sentence_scores
  supported_intents:
    - AI_DETECTION
