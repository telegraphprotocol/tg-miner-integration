version: "1"
kind: subnet
id: 32
slug: bittensor-sn32-itsai
protocol: bittensor
name: ItsAI Text Detector (Bittensor SN32)
description: >
  Bittensor Subnet 32 — ItsAI detects whether text was written by a human or
  generated by an AI. No API key required. The autonomous engine can use ItsAI
  for content authenticity verification before acting on text-based signals.

base_url: https://api.its-ai.org/api

auth:
  type: header
  env_var: SUBNET_32_API_KEY
  header_name: Authorization
  # Value in env must include the scheme prefix: APIKey <your_key>
  # e.g. SUBNET_32_API_KEY=APIKey sk-xxxxxxxxxxxxxxxx

rate_limit_per_sec: 10
cache_ttl_sec: 60
circuit_threshold: 5
circuit_cooldown_seconds: 30

endpoints:
  - path: /detect
    external_path: /text
    method: POST
    description: Detect whether a piece of text is AI-generated.

input_schema:
  type: object
  required: [text]
  properties:
    text:
      type: string
      minLength: 200
      description: The text sample to analyze for AI authorship (minimum 200 characters).
    deep_scan:
      type: boolean
      description: When true, returns per-sentence scores in addition to the overall result.

output_schema:
  type: object
  properties:
    answer:
      type: number
      enum: [0, 1]
      description: >
        1 = AI-generated, 0 = human-written.
    status:
      type: string
      description: "success or error"
    segmentation_tokens:
      type: array
      description: Per-sentence scores when deep_scan is true.

semantics:
  signal_mapping:
    type: text_authenticity
    confidence_field: answer
    label_field: answer
  supported_intents:
    - AI_DETECTION
